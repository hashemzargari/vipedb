name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  GO_VERSION: '1.25'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git to access private modules
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure GOPRIVATE
        run: |
          go env -w GOPRIVATE=github.com/GoMemPipe/memrag
          go env -w GOPRIVATE=github.com/GoMemPipe/mempipe

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

  build:
    name: Build Binaries
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
        exclude:
          - os: windows-latest
            arch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git to access private modules
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure GOPRIVATE
        run: |
          go env -w GOPRIVATE=github.com/GoMemPipe/memrag
          go env -w GOPRIVATE=github.com/GoMemPipe/mempipe

      - name: Install dependencies
        run: go mod download

      - name: Build on Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          GOOS=linux GOARCH=${{ matrix.arch }} go build -o vipe-linux-${{ matrix.arch }} ./cmd/vipe
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            GOOS=linux GOARCH=386 go build -o vipe-linux-386 ./cmd/vipe
          fi

      - name: Build on macOS
        if: matrix.os == 'macos-latest'
        run: |
          GOOS=darwin GOARCH=${{ matrix.arch }} go build -o vipe-darwin-${{ matrix.arch }} ./cmd/vipe
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            GOOS=darwin GOARCH=arm64 go build -o vipe-darwin-arm64 ./cmd/vipe
          fi

      - name: Build on Windows
        if: matrix.os == 'windows-latest'
        run: |
          GOOS=windows GOARCH=${{ matrix.arch }} go build -o vipe-windows-${{ matrix.arch }}.exe ./cmd/vipe
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vipe-${{ matrix.os }}-${{ matrix.arch }}
          path: vipe-*

  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git to access private modules
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure GOPRIVATE
        run: |
          go env -w GOPRIVATE=github.com/GoMemPipe/memrag
          go env -w GOPRIVATE=github.com/GoMemPipe/mempipe

      - name: Install dependencies
        run: go mod download

      - name: Build WebAssembly
        run: |
          GOOS=js GOARCH=wasm go build -o vipe.wasm ./cmd/vipe-wasm 2>/dev/null || echo "WebAssembly build skipped (no wasm target)"

      - name: Upload WebAssembly artifact
        uses: actions/upload-artifact@v4
        with:
          name: vipe-wasm
          path: vipe.wasm
        if: hashFiles('vipe.wasm') != ''

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, build-wasm]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten release assets
        run: |
          mkdir -p ./flat_artifacts
          find ./artifacts -type f -name 'vipe-*' -exec cp {} ./flat_artifacts/ \;
          find ./artifacts -type f -name 'vipe.wasm' -exec cp {} ./flat_artifacts/ \;
          ls -la ./flat_artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./flat_artifacts/vipe-*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git to access private modules
        run: |
          git config --global url."https://${{ secrets.PAT_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure GOPRIVATE
        run: |
          go env -w GOPRIVATE=github.com/GoMemPipe/memrag,github.com/GoMemPipe/mempipe

      - name: Publish to Go Proxy
        run: |
          GOPROXY=https://proxy.golang.org,direct go list -m github.com/hashemzargari/vipedb@${{ github.ref_name }}
